name: Release (Windows)

# Builds Windows NSIS (.exe) and WiX MSI (.msi) installers and publishes them
# to a GitHub Release. Triggered by pushing a version tag (e.g. v0.1.0), or
# run manually from the Actions tab to produce a draft release.
#
# SHARED-DRAFT BEHAVIOUR: This workflow and release-macos.yml both trigger on
# the same v* tag and both call tauri-action with the same tagName expression
# and releaseDraft: true. tauri-action finds-or-creates a draft release by tag,
# so whichever job runs first creates the draft and the other appends its assets
# to it. There is a known race on the initial releaseBody write (both workflows
# carry a body and the "winner" sets it). The user accepted this trade-off in
# favour of keeping release-macos.yml untouched (Option B topology). The bodies
# are written to be consistent: both contain the full OS-sectioned Downloads
# table so the release is useful regardless of which workflow won the race.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Least privilege: only the release job needs to write the Release + assets.
permissions:
  contents: read

# Cancel an in-progress run if a newer one supersedes it for the same ref.
concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build Windows installers
    runs-on: windows-latest
    permissions:
      contents: write # required to create the Release and upload installers

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        # Version comes from package.json "packageManager"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # No extra Rust targets needed on Windows — the default host target
      # (x86_64-pc-windows-msvc) is what we want. bundle.targets "all" in
      # tauri.conf.json produces both NSIS (*_x64-setup.exe) and WiX (*.msi).

      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # On a tag push this reuses the pushed tag; on manual dispatch it
          # creates one from the app version.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'v__VERSION__' }}
          releaseName: "claude-overlay __VERSION__"
          releaseBody: |
            ## Downloads

            ### Windows
            | Installer | File | Notes |
            |-----------|------|-------|
            | NSIS (recommended) | `claude-overlay_<version>_x64-setup.exe` | Guided installer, installs to user profile |
            | WiX MSI | `claude-overlay_<version>_x64_en-US.msi` | For managed/enterprise deployments |

            **First launch:** this build is not code-signed. Windows SmartScreen may
            show a "Windows protected your PC" warning. Click **More info** then
            **Run anyway** to proceed.

            ### macOS
            | Installer | File | Notes |
            |-----------|------|-------|
            | DMG (recommended) | `claude-overlay_<version>_universal.dmg` | Universal binary (Apple Silicon + Intel) |

            **First launch:** this build is not code-signed or notarized, so macOS
            Gatekeeper will block it. Right-click the app in /Applications and choose
            **Open**, or run:
            `xattr -dr com.apple.quarantine /Applications/claude-overlay.app`

            Requires macOS 11.0 (Big Sur) or later.
          releaseDraft: true
          prerelease: false
          # No --target flag needed; the default host target produces the
          # correct x64 Windows bundles via bundle.targets "all".
