name: Release (macOS)

# Builds a universal (Apple Silicon + Intel) macOS .app/.dmg and publishes it
# to a GitHub Release. Triggered by pushing a version tag (e.g. v0.1.0), or
# run manually from the Actions tab to produce a draft release.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Least privilege: only the release job needs to write the Release + assets.
permissions:
  contents: read

# Cancel an in-progress run if a newer one supersedes it for the same ref.
concurrency:
  group: release-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: Build universal macOS bundle
    runs-on: macos-14 # Apple Silicon runner; cross-builds the x86_64 slice too
    permissions:
      contents: write # required to create the Release and upload the .dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        # Version comes from package.json "packageManager"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Add Rust targets for universal binary
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # On a tag push this reuses the pushed tag; on manual dispatch it
          # creates one from the app version.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'v__VERSION__' }}
          releaseName: "claude-overlay __VERSION__"
          releaseBody: |
            Unsigned universal macOS build (Apple Silicon + Intel).

            **First launch:** this build is not code-signed or notarized, so macOS
            Gatekeeper will block it. Right-click the app in /Applications and choose
            **Open**, or run:
            `xattr -dr com.apple.quarantine /Applications/claude-overlay.app`

            Requires macOS 11.0 (Big Sur) or later.
          releaseDraft: true
          prerelease: false
          args: --target universal-apple-darwin
